version: '3.8'

# index-summary 전용 Docker Compose 설정
# 주의: 이 파일은 index-summary를 Docker로만 배포합니다.
# index-summary는 130.162.128.36 서버에 설치되며, 같은 서버의 MySQL/QuestDB에 접근합니다.

services:
  index-summary:
    build:
      context: ./be/index-summary
      dockerfile: Dockerfile
    image: bonanza-index/index-summary:latest
    container_name: index-summary
    restart: unless-stopped
    # network_mode: host를 사용하여 호스트의 네트워크를 직접 사용
    # 이렇게 하면 127.0.0.1이 호스트 머신을 가리킵니다
    network_mode: host
    env_file:
      - ./be/index-summary/env/prod.env
    environment:
      - NODE_ENV=production
      - TZ=Asia/Seoul
      # network_mode: host를 사용하므로 127.0.0.1이 호스트 머신을 가리킵니다
      - DB_HOST=127.0.0.1
      - DB_PORT=30306
      - DB_SCHEME=dayfin
      - DB_USERNAME=bonanza
      - DB_PASSWORD=56tyghbn
      - QDB_HOST=127.0.0.1
      - QDB_ILP_HOST=127.0.0.1
    volumes:
      - ./be/index-summary/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep 'node.*dist/app.js' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

