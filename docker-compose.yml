version: '3.8'

# 주의: 이 파일은 개발/테스트 목적으로 사용됩니다.
# 프로덕션 환경에서는 Kubernetes (k3s)로 배포하는 것을 권장합니다.
# Kubernetes 배포: ./k8s/scripts/deploy-worker.sh

services:
  orderbook-collector:
    build:
      context: ./be
      dockerfile: orderbook-collector/Dockerfile
    image: bonanza-index/orderbook-collector:latest
    container_name: orderbook-collector
    restart: unless-stopped
    ports:
      - "6001:6001"
    env_file:
      - ./be/orderbook-collector/env/prod.env
    environment:
      - NODE_ENV=production
    networks:
      - bonanza-network
    volumes:
      - ./be/orderbook-collector/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:6001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ticker-collector:
    build:
      context: ./be
      dockerfile: ticker-collector/Dockerfile
    image: bonanza-index/ticker-collector:latest
    container_name: ticker-collector
    restart: unless-stopped
    ports:
      - "6002:6001"
    env_file:
      - ./be/ticker-collector/env/prod.env
    environment:
      - NODE_ENV=production
    networks:
      - bonanza-network
    volumes:
      - ./be/ticker-collector/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:6001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  bonanza-network:
    driver: bridge

