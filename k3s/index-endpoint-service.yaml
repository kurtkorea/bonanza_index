apiVersion: v1
kind: Service
metadata:
  name: index-endpoint
  namespace: bonanza-index
  labels:
    app: index-endpoint
spec:
  type: LoadBalancer
  ports:
  - port: 3009
    targetPort: 3009
    protocol: TCP
    name: http
  - port: 7757
    targetPort: 7757
    protocol: TCP
    name: zmq-pub-command
  selector:
    app: index-endpoint

