apiVersion: apps/v1
kind: Deployment
metadata:
  name: index-calc-fe
  namespace: bonanza-index
  labels:
    app: index-calc-fe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: index-calc-fe
  template:
    metadata:
      labels:
        app: index-calc-fe
    spec:
      containers:
      - name: index-calc-fe
        image: bonanza-index/index-calc-fe:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "100m"  # 2코어 노드에 맞춰 조정
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5

