apiVersion: v1
kind: Service
metadata:
  name: ticker-collector-service-2
  namespace: bonanza-index
  labels:
    app: ticker-collector
    instance: "2"
spec:
  type: ClusterIP
  ports:
  - port: 6001
    targetPort: 6001
    protocol: TCP
    name: http
  - port: 6657
    targetPort: 6657
    protocol: TCP
    name: zmq-pub
  - port: 5657
    targetPort: 5657
    protocol: TCP
    name: zmq-push
  selector:
    app: ticker-collector
    instance: "2"

