# Active-Active 이중화 배포 설정
# 두 개의 독립적인 인스턴스가 동시에 동일한 데이터를 수집하고, Storage Worker에서 중복 제거
# 자세한 내용은 k8s/collectors/COLLECTOR_REDUNDANCY_STRATEGY.md 참조

---
# Primary 인스턴스 (Active)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticker-collector-primary
  namespace: bonanza-index
  labels:
    app: ticker-collector
    role: primary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticker-collector
      role: primary
  template:
    metadata:
      labels:
        app: ticker-collector
        role: primary
    spec:
      # DNS 정책: ClusterFirst (기본 Kubernetes DNS 정책 사용)
      # CoreDNS가 외부 DNS를 forward하도록 설정되어 있으므로 내부/외부 모두 조회 가능
      dnsPolicy: "ClusterFirst"
      containers:
      - name: ticker-collector
        image: bonanza-index/ticker-collector:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 6001
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "6001"
        - name: DEPTH
          value: "15"
        - name: TICK_MS
          value: "1000"
        - name: SYMBOL
          value: "KRW-BTC"
        - name: ZMQ_PUSH_PORT
          value: "5657"
        - name: ZMQ_PUSH_HOST
          value: "tcp://ticker-storage-worker-service:5657"
        - name: ZMQ_PUB_PORT
          value: "6657"
        - name: PUSH_QUEUE_SIZE
          value: "50000"
        - name: PUB_QUEUE_SIZE
          value: "50000"
        - name: IS_RAW_DATA
          value: "true"
        - name: TELEGRAM_SERVICE_URL
          value: "http://telegram-log-service:3109/v1/telegram"
        # 로그 출력 최적화
        - name: NODE_OPTIONS
          value: "--no-warnings"
        - name: NODE_NO_WARNINGS
          value: "1"
        # stdout/stderr 버퍼링 방지 (로그 실시간 출력)
        - name: PYTHONUNBUFFERED
          value: "1"
        # Process ID 설정 (Primary 인스턴스)
        # 실제 process_id 값은 데이터베이스의 tb_index_process_info 테이블에 등록된 값을 사용해야 합니다
        - name: PROCESS_ID
          value: "collector-process"
        # Collector 역할 설정
        - name: COLLECTOR_ROLE
          value: "primary"
        envFrom:
        - configMapRef:
            name: bonanza-common-config
        - secretRef:
            name: bonanza-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "60m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 6001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 6001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
# Secondary 인스턴스 (Active)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticker-collector-secondary
  namespace: bonanza-index
  labels:
    app: ticker-collector
    role: secondary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticker-collector
      role: secondary
  template:
    metadata:
      labels:
        app: ticker-collector
        role: secondary
    spec:
      # DNS 정책: ClusterFirst (기본 Kubernetes DNS 정책 사용)
      # CoreDNS가 외부 DNS를 forward하도록 설정되어 있으므로 내부/외부 모두 조회 가능
      dnsPolicy: "ClusterFirst"
      containers:
      - name: ticker-collector
        image: bonanza-index/ticker-collector:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 6001
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "6001"
        - name: DEPTH
          value: "15"
        - name: TICK_MS
          value: "1000"
        - name: SYMBOL
          value: "KRW-BTC"
        - name: ZMQ_PUSH_PORT
          value: "5657"
        - name: ZMQ_PUSH_HOST
          value: "tcp://ticker-storage-worker-service:5657"
        - name: ZMQ_PUB_PORT
          value: "6657"
        - name: PUSH_QUEUE_SIZE
          value: "50000"
        - name: PUB_QUEUE_SIZE
          value: "50000"
        - name: IS_RAW_DATA
          value: "true"
        - name: TELEGRAM_SERVICE_URL
          value: "http://telegram-log-service:3109/v1/telegram"
        # 로그 출력 최적화
        - name: NODE_OPTIONS
          value: "--no-warnings"
        - name: NODE_NO_WARNINGS
          value: "1"
        # stdout/stderr 버퍼링 방지 (로그 실시간 출력)
        - name: PYTHONUNBUFFERED
          value: "1"
        # Process ID 설정 (Secondary 인스턴스)
        # 실제 process_id 값은 데이터베이스의 tb_index_process_info 테이블에 등록된 값을 사용해야 합니다
        - name: PROCESS_ID
          value: "collector-process"
        # Collector 역할 설정
        - name: COLLECTOR_ROLE
          value: "secondary"
        envFrom:
        - configMapRef:
            name: bonanza-common-config
        - secretRef:
            name: bonanza-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "60m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 6001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 6001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
# Primary Service
apiVersion: v1
kind: Service
metadata:
  name: ticker-collector-primary
  namespace: bonanza-index
  labels:
    app: ticker-collector
    role: primary
spec:
  type: ClusterIP
  ports:
  - port: 6001
    targetPort: 6001
    protocol: TCP
    name: http
  - port: 6657
    targetPort: 6657
    protocol: TCP
    name: zmq-pub
  - port: 5657
    targetPort: 5657
    protocol: TCP
    name: zmq-push
  selector:
    app: ticker-collector
    role: primary

---
# Secondary Service
apiVersion: v1
kind: Service
metadata:
  name: ticker-collector-secondary
  namespace: bonanza-index
  labels:
    app: ticker-collector
    role: secondary
spec:
  type: ClusterIP
  ports:
  - port: 6001
    targetPort: 6001
    protocol: TCP
    name: http
  - port: 6657
    targetPort: 6657
    protocol: TCP
    name: zmq-pub
  - port: 5657
    targetPort: 5657
    protocol: TCP
    name: zmq-push
  selector:
    app: ticker-collector
    role: secondary

---
# PodDisruptionBudget: 최소 1개 Pod 유지 보장
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ticker-collector-pdb
  namespace: bonanza-index
spec:
  minAvailable: 1  # 최소 1개 Pod 유지
  selector:
    matchLabels:
      app: ticker-collector

