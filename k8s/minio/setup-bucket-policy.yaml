apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup-bucket-policy
  namespace: bonanza-index
  labels:
    app: minio-setup
spec:
  ttlSecondsAfterFinished: 300  # Job 완료 후 5분 후 자동 삭제
  template:
    metadata:
      labels:
        app: minio-setup
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mc
        image: minio/mc:latest
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Setting up MinIO bucket policy..."
          
          # MinIO 서버 연결
          mc alias set minio-server \
            http://minio-service.bonanza-index.svc.cluster.local:9000 \
            ${MINIO_ROOT_USER} \
            ${MINIO_ROOT_PASSWORD}
          
          # 버킷이 존재하는지 확인하고 없으면 생성
          if ! mc ls minio-server/bonanza-index &> /dev/null; then
            echo "Creating bucket: bonanza-index"
            mc mb minio-server/bonanza-index
          else
            echo "Bucket bonanza-index already exists"
          fi
          
          # 버킷 정책 설정 (public read access)
          echo "Setting bucket policy to public read..."
          mc anonymous set download minio-server/bonanza-index
          
          # 버킷 정책 확인
          echo "Current bucket policy:"
          mc anonymous get minio-server/bonanza-index
          
          # 버킷 목록 확인
          echo "Available buckets:"
          mc ls minio-server
          
          echo "Bucket policy setup completed successfully!"
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: bonanza-secrets
              key: MINIO_ROOT_USER
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bonanza-secrets
              key: MINIO_ROOT_PASSWORD

