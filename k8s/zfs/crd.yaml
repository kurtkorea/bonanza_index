# OpenEBS ZFS CRD (Custom Resource Definitions)
# OpenEBS ZFS Local PV에 필요한 CRD

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: zfsnodes.zfs.openebs.io
spec:
  group: zfs.openebs.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              poolName:
                type: string
              nodeID:
                type: string
          status:
            type: object
  scope: Cluster
  names:
    plural: zfsnodes
    singular: zfsnode
    kind: ZFSNode
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: zfsvolumes.zfs.openebs.io
spec:
  group: zfs.openebs.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              capacity:
                type: string
              ownerNodeID:
                type: string
              poolName:
                type: string
              volumeType:
                type: string
              fsType:
                type: string
          status:
            type: object
            properties:
              state:
                type: string
              nodeID:
                type: string
  scope: Namespaced
  names:
    plural: zfsvolumes
    singular: zfsvolume
    kind: ZFSVolume
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: zfsbackups.zfs.openebs.io
spec:
  group: zfs.openebs.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
  scope: Namespaced
  names:
    plural: zfsbackups
    singular: zfsbackup
    kind: ZFSBackup
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: zfsrestores.zfs.openebs.io
spec:
  group: zfs.openebs.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
  scope: Namespaced
  names:
    plural: zfsrestores
    singular: zfsrestore
    kind: ZFSRestore

