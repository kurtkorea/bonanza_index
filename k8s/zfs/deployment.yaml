apiVersion: apps/v1
kind: Deployment
metadata:
  name: zfs-csi-controller
  namespace: bonanza-index
  labels:
    app: zfs-csi-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zfs-csi-controller
  template:
    metadata:
      labels:
        app: zfs-csi-controller
    spec:
      serviceAccountName: zfs-csi-controller-sa
      containers:
      - name: zfs-csi-controller
        image: openebs/zfs-driver:latest
        imagePullPolicy: IfNotPresent
        args:
        - "--endpoint=$(CSI_ENDPOINT)"
        - "--nodeid=$(NODE_NAME)"
        env:
        - name: CSI_ENDPOINT
          value: unix:///var/lib/csi/sockets/pluginproxy/csi.sock
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: socket-dir
          mountPath: /var/lib/csi/sockets/pluginproxy/
      volumes:
      - name: socket-dir
        emptyDir: {}
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"

