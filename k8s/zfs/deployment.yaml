apiVersion: apps/v1
kind: Deployment
metadata:
  name: zfs-csi-controller
  namespace: bonanza-index
  labels:
    app: zfs-csi-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zfs-csi-controller
  template:
    metadata:
      labels:
        app: zfs-csi-controller
    spec:
      serviceAccountName: zfs-csi-controller-sa
      containers:
      - name: zfs-csi-controller
        image: openebs/zfs-driver:latest
        imagePullPolicy: IfNotPresent
        args:
        - "--endpoint=$(CSI_ENDPOINT)"
        - "--plugin=controller"
        - "--nodename=$(NODE_NAME)"
        env:
        - name: CSI_ENDPOINT
          value: unix:///var/lib/csi/sockets/pluginproxy/csi.sock
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: socket-dir
          mountPath: /var/lib/csi/sockets/pluginproxy/
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      - name: csi-provisioner
        image: registry.k8s.io/sig-storage/csi-provisioner:v3.5.0
        imagePullPolicy: IfNotPresent
        args:
        - "--csi-address=$(ADDRESS)"
        - "--v=5"
        - "--timeout=30s"
        - "--leader-election"
        - "--leader-election-lease-duration=15s"
        - "--leader-election-renew-deadline=10s"
        - "--leader-election-retry-period=5s"
        env:
        - name: ADDRESS
          value: /var/lib/csi/sockets/pluginproxy/csi.sock
        volumeMounts:
        - name: socket-dir
          mountPath: /var/lib/csi/sockets/pluginproxy/
        resources:
          requests:
            memory: "32Mi"
            cpu: "20m"
          limits:
            memory: "64Mi"
            cpu: "50m"
      volumes:
      - name: socket-dir
        emptyDir: {}
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"

